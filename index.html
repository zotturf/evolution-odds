<!DOCTYPE html>
<html>
<head>
<title>Meeting Odds Evolution</title>

<style>
body {
    font-family: Verdana, Arial, sans-serif;
    background: #f2f4f7;
    margin: 30px;
}

/* Watermark */
.watermark {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.06;
    z-index: 1000;
    pointer-events: none;
}
.watermark img { width: 650px; }

/* Header */
.header {
    background: linear-gradient(90deg, #d4af37, #f3e2a9, #d4af37);
    padding: 18px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    border-radius: 8px;
    margin-bottom: 25px;
}
.logo { height: 45px; vertical-align: middle; margin-right: 10px; }

/* Race title */
.race-title {
    background: #e6e6e6;
    padding: 6px;
    font-weight: bold;
    margin-top: 15px;
}

/* Table */
table {
    border-collapse: collapse;
    width: 100%;
    background: white;
    margin-bottom: 25px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

th {
    background: #800020;
    color: #d4af37;
    padding: 10px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

.horse { text-align: left; font-weight: bold; }
.silk img { height: 40px; }

/* Favorite */
.fav {
    border-left: 6px solid #d4af37;
    background: #fff8dc;
    font-weight: bold;
}

/* Odds grid */
.odds-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    font-size: 12px;
}
.time {
    color: #666;
    font-size: 10px;
}
.up { color: red; font-weight: bold; }
.down { color: green; font-weight: bold; }

/* Footer */
.footer {
    margin-top: 30px;
    padding: 14px;
    text-align: center;
    font-size: 14px;
    background: #800020;
    color: #d4af37;
    border-radius: 8px;
}
.footer a {
    text-decoration: none;
    font-weight: bold;
    background: #d4af37;
    color: #800020;
    padding: 4px 10px;
    border-radius: 4px;
    margin-left: 5px;
}
</style>
</head>

<body>

<div class="watermark">
    <img src="zot_logo.png">
</div>

<div class="header">
    <img src="zot_logo.png" class="logo">
    MEETING ODDS EVOLUTION – ZOT TURF
</div>

<!-- 🔥 AUTO GENERATED CONTENT -->
<div id="races-container"></div>

<div class="footer">
Download our free digital magazine 
<a href="#">here</a>
</div>

<!-- 🔥 SCRIPT -->
<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSXQMZk4ztuA_CBryNptjvNxZKchCbcd1OyY8DNJVBtg4XOfYtfMZ6jsNHAWSdBV2BpjpMGQy4eNkhp/pub?output=csv";

const TIMES = [
"Thu 15:00","Thu 17:00","Fri 10:00","Fri 13:00",
"Fri 15:00","Fri 17:00","Sat 09:00","Sat 11:00"
];

function getTrend(current, previous){
  if(!previous) return current;
  if(current > previous) return `<span class="up">${current} ↑</span>`;
  if(current < previous) return `<span class="down">${current} ↓</span>`;
  return current;
}

fetch(sheetURL)
.then(res => res.text())
.then(csv => {

  const rows = csv.split("\n")
  .slice(1)
  .map(r => r.replace(/\r/g, "").trim())
  .filter(r => {
    const first = r.split(",")[0];
    return (
      r !== "" &&
      first !== "Race" &&
      first !== "MEETING 14" &&
      !isNaN(first)   // ✅ ONLY keep numeric race rows
    );
  });
  const races = {};

  rows.forEach(row => {
    const cols = row.replace(/\r/g, "").split(",");
// ✅ skip unwanted rows
  if (cols[0] === "Race" || cols[0] === "MEETING 14") return;
    const race = cols[0];
    if(!races[race]) races[race] = [];

    races[race].push({
      no: cols[1],
      horse: cols[2],
      jockey: cols[3],
      trainer: cols[4],
      weight: cols[5],
      draw: cols[6],
      silk: cols[7],
      odds: cols.slice(8,16).map(x => parseInt(x))
    });
  });

  const container = document.getElementById("races-container");

  Object.keys(races).forEach(raceNum => {

    const raceData = races[raceNum];

    // ⭐ Favorite = lowest last odds
    let favValue = Math.min(...raceData.map(h => h.odds[7]));

    let html = `
    <div class="race-title">RACE ${raceNum}</div>
    <table>
    <tr>
    <th>No</th><th>Silk</th><th>Horse</th><th>Jockey</th><th>Trainer</th>
    <th>Weight</th><th>Draw</th><th>Odds Evolution</th>
    </tr>
    `;

    raceData.forEach(h => {

      const isFav = h.odds[7] === favValue;

      html += `
      <tr class="${isFav ? 'fav' : ''}">
        <td>${h.no}</td>
        <td class="silk">
  <img src="silks/${h.silk}" onerror="this.style.display='none'">
</td>
        <td class="horse">${h.horse} ${isFav ? '★' : ''}</td>
        <td>${h.jockey}</td>
        <td>${h.trainer}</td>
        <td>${h.weight}</td>
        <td>${h.draw}</td>
        <td>
          <div class="odds-grid">
      `;

      // time row
      TIMES.forEach(t => {
        html += `<div class="time">${t}</div>`;
      });

      // odds + arrows
      h.odds.forEach((val,i) => {
        html += `<div>${getTrend(val, h.odds[i-1])}</div>`;
      });

      html += `
          </div>
        </td>
      </tr>
      `;
    });

    html += `</table>`;
    container.innerHTML += html;

  });

});
</script>

</body>
</html>
